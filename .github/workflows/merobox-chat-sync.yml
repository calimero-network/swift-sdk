name: Merobox Chat Sync (curb)

# The chat-app analog of merobox-sync.yml: instead of kv_store, it exercises the
# REAL published mero-chat app (com.calimero.curb, downloaded from
# apps.calimero.network) that the iOS sample installs — meshing a curb "Channel"
# context across two Docker nodes, sending a message on node 1, and asserting it
# replicates to node 2. This proves mero-chat cross-node message sync works
# without the flaky iOS simulator path.
#
# INFORMATIONAL (continue-on-error): it pins the live published artifact against
# the moving `edge` node image and can't be verified locally without Docker, so
# it surfaces the signal without gating. Promote to a gate once it's proven
# green on CI (drop continue-on-error), like merobox-sync.yml was.
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
    paths:
      - 'ci/merobox/chat-sync-two-node.yml'
      - '.github/workflows/merobox-chat-sync.yml'
  workflow_dispatch:
    inputs:
      merod_image:
        description: 'merod Docker image (default ghcr.io/calimero-network/merod:edge)'
        required: false
        default: 'ghcr.io/calimero-network/merod:edge'
      curb_version:
        description: 'curb version to test (default: latest on the registry)'
        required: false
        default: ''

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  chat-sync:
    name: Two-node curb message sync
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # Informational until proven green on CI (real published app vs moving edge).
    continue-on-error: true
    env:
      MEROD_IMAGE: ${{ github.event.inputs.merod_image || 'ghcr.io/calimero-network/merod:edge' }}
      REGISTRY: https://apps.calimero.network
      PACKAGE: com.calimero.curb
      CURB_VERSION: ${{ github.event.inputs.curb_version }}
      WF: ci/merobox/chat-sync-two-node.yml
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install merobox
        run: |
          python -m pip install --upgrade pip
          pip install merobox
          merobox --version

      # Download the published curb bundle (.mpk = gzip tar of app.wasm + manifest)
      # and extract the wasm to the path the workflow references. Resolve the
      # latest version from the registry unless one was given.
      - name: Download curb app.wasm from the registry
        run: |
          set -euo pipefail
          VER="${CURB_VERSION}"
          if [ -z "$VER" ]; then
            VER=$(curl -sfL "${REGISTRY}/api/v2/bundles?package=${PACKAGE}" \
              | python3 -c "import sys,json; b=json.load(sys.stdin); print(sorted([x['appVersion'] for x in (b if isinstance(b,list) else b.get('data',b))], reverse=True)[0])")
          fi
          echo "curb version: $VER"
          echo "CURB_RESOLVED=$VER" >> "$GITHUB_ENV"
          curl -sfL "${REGISTRY}/artifacts/${PACKAGE}/${VER}/${PACKAGE}-${VER}.mpk" -o curb.mpk
          mkdir -p extract ci/merobox/res
          tar xzf curb.mpk -C extract
          cp "$(find extract -name '*.wasm' | head -1)" ci/merobox/res/curb-app.wasm
          ls -la ci/merobox/res/curb-app.wasm
          file ci/merobox/res/curb-app.wasm

      - name: Pull merod image
        run: docker pull "$MEROD_IMAGE"

      - name: Pin node image in workflow
        run: |
          sed -i "s#image: ghcr.io/calimero-network/merod:edge#image: ${MEROD_IMAGE}#" "$WF"
          grep 'image:' "$WF"

      - name: Validate workflow
        run: merobox bootstrap validate "$WF"

      - name: Run curb message-sync check
        run: |
          set -o pipefail
          merobox bootstrap run "$WF" 2>&1 | tee merobox-run.log

      - name: Summarize result
        if: always()
        run: |
          {
            echo "## curb (mero-chat ${CURB_RESOLVED:-?}) two-node message sync"
            if grep -q "Sync verification failed" merobox-run.log 2>/dev/null; then
              echo ":warning: **Context state did NOT converge** — final per-node state below."
              echo ""; echo '```'
              sed -n '/Final state:/,/failed/p' merobox-run.log | head -30
              echo '```'
            elif grep -qE "All assertions passed|Workflow completed successfully" merobox-run.log 2>/dev/null; then
              echo ":white_check_mark: node 2 read back node 1's chat message — mero-chat sync works."
            else
              echo "See job log — no clear pass/fail marker found (curb init or contract-arg issue?)."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Node logs on failure
        if: always()
        run: |
          for c in $(docker ps -a --format '{{.Names}}' | grep -i calimero || true); do
            echo "::group::docker logs $c"
            docker logs "$c" 2>&1 | tail -200 || true
            echo "::endgroup::"
          done

      - name: Tear down nodes
        if: always()
        run: |
          merobox stop --all 2>/dev/null || true
          merobox nuke -f 2>/dev/null || true
