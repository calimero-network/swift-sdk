name: iOS E2E (vs live merod)

# End-to-end iOS tests against a REAL merod node + registry (heavier than the
# mock XCUITest in ui.yml, so this runs on master pushes / manually / weekly,
# not on every PR). Two jobs:
#   * single-node — full-feature AppE2ETests (login → explorer → chat).
#   * multi-node  — two nodes + two simulators, cross-user chat (ChatMultiUserTests),
#     driven by chat-multi-e2e.sh. Allowed to fail: cross-node gossipsub between
#     two co-located merods is unreliable on a single host, so this job is
#     informational until that (core-side) settles.
on:
  workflow_dispatch:
  push:
    branches:
      - master
  schedule:
    - cron: '0 7 * * 1'  # Mondays 07:00 UTC

permissions:
  contents: read

jobs:
  single-node-e2e:
    name: Full-feature e2e (1 node)
    runs-on: macos-15
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v7

      - name: Install tools
        run: brew install xcodegen

      - name: Download released merod
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Download the newest release that ACTUALLY HAS the darwin merod asset.
          # A brand-new RC can exist with assets still uploading (empty asset
          # list), so `--limit 1` alone would fail — walk recent releases instead.
          # Uses `gh release download` (correct asset URL + auth).
          set -x
          for TAG in $(gh release list --repo calimero-network/core --limit 10 --json tagName -q '.[].tagName'); do
            echo "trying core release $TAG"
            if gh release download "$TAG" --repo calimero-network/core \
                 --pattern 'merod_aarch64-apple-darwin.tar.gz' --output merod.tar.gz --clobber \
              && tar xzf merod.tar.gz \
              && chmod +x ./merod \
              && sudo mv ./merod /usr/local/bin/merod \
              && merod --version; then
              echo "using merod from $TAG"; exit 0
            fi
            echo "$TAG has no darwin merod asset (yet); trying older"
          done
          echo "::error::no core release with a darwin merod asset in the last 10"; exit 1

      - name: Run AppE2ETests (boots node + sim)
        run: ./e2e-ios.sh

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-e2e-single-node
          path: |
            .e2e-ios.log
            .mero-e2e-node.log
          if-no-files-found: warn
          include-hidden-files: true

  multi-node-e2e:
    name: Multi-user chat e2e (2 nodes / 2 sims)
    runs-on: macos-15
    timeout-minutes: 50
    # Informational: cross-node sync between co-located merods is flaky on one host.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7

      - name: Install tools
        run: brew install xcodegen

      - name: Download released merod
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Newest release that actually has the darwin merod asset (a fresh RC
          # can exist with assets still uploading).
          set -x
          for TAG in $(gh release list --repo calimero-network/core --limit 10 --json tagName -q '.[].tagName'); do
            if gh release download "$TAG" --repo calimero-network/core \
                 --pattern 'merod_aarch64-apple-darwin.tar.gz' --output merod.tar.gz --clobber \
              && tar xzf merod.tar.gz \
              && chmod +x ./merod \
              && sudo mv ./merod /usr/local/bin/merod; then
              echo "using merod from $TAG"; exit 0
            fi
          done
          echo "::error::no core release with a darwin merod asset in the last 10"; exit 1

      - name: Run chat-multi-e2e.sh (2 nodes, 2 sims)
        run: ./chat-multi-e2e.sh

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-e2e-multi-node
          path: |
            .mero-a.log
            .mero-b.log
            .mero-role-*.log
          if-no-files-found: warn
          include-hidden-files: true
