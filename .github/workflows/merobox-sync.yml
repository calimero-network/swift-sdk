name: Merobox Sync (2 nodes)

# Backend/protocol-level sync check: boots two real merod nodes in Docker via
# merobox, meshes a shared kv_store context across them, writes on node 1, and
# asserts the write replicates to node 2 AND the context state hash converges
# (i.e. actually initializes — not the all-ones "uninitialized" hash). This is
# the node + WASM + sync signal underneath the iOS chat e2e, isolated from the
# curb app and the simulator.
#
# Docker-based, so it runs on ubuntu (the macOS runners the iOS suites use have
# no Docker). Not a blanket PR gate: it exercises the upstream `edge` node image
# (merod has no 0.11.x Docker tag), so it runs on master pushes / weekly / on
# demand, plus PRs that touch the merobox harness itself.
#
# INFORMATIONAL (continue-on-error), mirroring the multi-node iOS e2e job: on
# the current `edge` image node 2 joins the group but its context state stays on
# the all-ones "uninitialized" hash (11111111...) — the same cross-node sync
# issue seen in the iOS chat e2e, which is being investigated core-side. The
# assertions are real, so when sync converges this job goes green on its own and
# can be promoted to a required gate (drop `continue-on-error`).
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
    paths:
      - 'ci/merobox/**'
      - '.github/workflows/merobox-sync.yml'
  workflow_dispatch:
    inputs:
      merod_image:
        description: 'merod Docker image (default ghcr.io/calimero-network/merod:edge)'
        required: false
        default: 'ghcr.io/calimero-network/merod:edge'
  schedule:
    - cron: '0 8 * * 1'  # Mondays 08:00 UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  two-node-sync:
    name: Two-node cross-node sync (kv_store)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Informational until cross-node context-state sync converges on the node
    # image (see header). Keeps the harness running + visible without gating.
    continue-on-error: true
    env:
      MEROD_IMAGE: ${{ github.event.inputs.merod_image || 'ghcr.io/calimero-network/merod:edge' }}
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install merobox
        run: |
          python -m pip install --upgrade pip
          pip install merobox
          merobox --version

      - name: Pull merod image
        run: docker pull "$MEROD_IMAGE"

      # Point the workflow at the resolved image (workflow_dispatch override or
      # the edge default) without editing the checked-in YAML.
      - name: Pin node image in workflow
        run: |
          sed -i "s#image: ghcr.io/calimero-network/merod:edge#image: ${MEROD_IMAGE}#" \
            ci/merobox/sync-two-node.yml
          grep 'image:' ci/merobox/sync-two-node.yml

      - name: Validate workflow
        run: merobox bootstrap validate ci/merobox/sync-two-node.yml

      - name: Run two-node sync check
        run: |
          set -o pipefail
          merobox bootstrap run ci/merobox/sync-two-node.yml 2>&1 | tee merobox-run.log

      - name: Summarize sync result
        if: always()
        run: |
          {
            echo "## Two-node cross-node sync"
            if grep -q "Sync verification failed" merobox-run.log 2>/dev/null; then
              echo ":warning: **Context state did NOT converge** — the known cross-node"
              echo "sync issue (node 2 stuck on the all-ones uninitialized hash). This job"
              echo "is informational; see the final state below."
              echo ""
              echo '```'
              sed -n '/Final state:/,/failed/p' merobox-run.log | head -20
              echo '```'
            elif grep -q "Workflow completed successfully\|✓ Assert" merobox-run.log 2>/dev/null; then
              echo ":white_check_mark: Sync converged and node 2 read back node 1's write."
            else
              echo "See job log — no clear pass/fail marker found."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Dump node logs on failure
        if: failure()
        run: |
          for c in $(docker ps -a --format '{{.Names}}' | grep -i calimero || true); do
            echo "::group::docker logs $c"
            docker logs "$c" 2>&1 | tail -200 || true
            echo "::endgroup::"
          done

      - name: Tear down nodes
        if: always()
        run: |
          merobox stop --all 2>/dev/null || true
          merobox nuke -f 2>/dev/null || true
