name: Merobox Sync (2 nodes)

# Backend/protocol-level sync checks: boot two real merod nodes in Docker via
# merobox, mesh a shared kv_store context across them, and assert writes
# replicate across nodes AND the context state hash converges (i.e. actually
# initializes — not the all-ones "uninitialized" hash). Two scenarios:
#   * sync-two-node.yml       — node 1 -> node 2
#   * sync-two-node-bidi.yml  — node 1 -> node 2 AND node 2 -> node 1
# This is the node + WASM + sync signal underneath the iOS chat e2e, isolated
# from the curb app and the simulator.
#
# Docker-based, so it runs on ubuntu (the macOS runners the iOS suites use have
# no Docker). Not a blanket PR gate: it exercises the upstream `edge` node image
# (merod has no 0.11.x Docker tag), so it runs on master pushes / weekly / on
# demand, plus PRs that touch the merobox harness itself.
#
# INFORMATIONAL (continue-on-error), mirroring the multi-node iOS e2e job: on
# the current `edge` image node 2 joins the group but its context state stays on
# the all-ones "uninitialized" hash (11111111...) — the same cross-node sync
# issue seen in the iOS chat e2e, being investigated core-side. The assertions
# are real, so when sync converges these jobs go green on their own and can be
# promoted to required gates (drop `continue-on-error`). The always-on log +
# peer-connectivity dump is there to tell "nodes never peered" apart from
# "peered but state didn't sync".
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
    paths:
      - 'ci/merobox/**'
      - '.github/workflows/merobox-sync.yml'
  workflow_dispatch:
    inputs:
      merod_image:
        description: 'merod Docker image (default ghcr.io/calimero-network/merod:edge)'
        required: false
        default: 'ghcr.io/calimero-network/merod:edge'
  schedule:
    - cron: '0 8 * * 1'  # Mondays 08:00 UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  sync:
    name: ${{ matrix.scenario }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # Informational until cross-node context-state sync converges on the node
    # image (see header). Keeps the harness running + visible without gating.
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        scenario:
          - sync-two-node.yml
          - sync-two-node-bidi.yml
    env:
      MEROD_IMAGE: ${{ github.event.inputs.merod_image || 'ghcr.io/calimero-network/merod:edge' }}
      WF: ci/merobox/${{ matrix.scenario }}
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install merobox
        run: |
          python -m pip install --upgrade pip
          pip install merobox
          merobox --version

      - name: Pull merod image
        run: docker pull "$MEROD_IMAGE"

      # Point the workflow at the resolved image (workflow_dispatch override or
      # the edge default) without editing the checked-in YAML.
      - name: Pin node image in workflow
        run: |
          sed -i "s#image: ghcr.io/calimero-network/merod:edge#image: ${MEROD_IMAGE}#" "$WF"
          grep 'image:' "$WF"

      - name: Validate workflow
        run: merobox bootstrap validate "$WF"

      - name: Run sync check
        run: |
          set -o pipefail
          merobox bootstrap run "$WF" 2>&1 | tee merobox-run.log

      - name: Summarize result
        if: always()
        run: |
          {
            echo "## ${{ matrix.scenario }}"
            if grep -q "Sync verification failed" merobox-run.log 2>/dev/null; then
              echo ":warning: **Context state did NOT converge** — the known cross-node"
              echo "sync issue (a node stuck on the all-ones uninitialized hash). This job"
              echo "is informational; final per-node state below."
              echo ""
              echo '```'
              sed -n '/Final state:/,/failed/p' merobox-run.log | head -30
              echo '```'
            elif grep -qE "All assertions passed|Workflow completed successfully" merobox-run.log 2>/dev/null; then
              echo ":white_check_mark: Sync converged and the write(s) replicated across nodes."
            else
              echo "See job log — no clear pass/fail marker found."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      # Always capture node logs + connectivity so a failure can be diagnosed as
      # "nodes never peered" (discovery/networking) vs "peered but state didn't
      # sync" (the sync path itself). Best-effort greps — never fail the step.
      - name: Node logs + connectivity
        if: always()
        run: |
          {
            echo "### Peer connectivity (best-effort grep of node logs)"
            echo '```'
            for c in $(docker ps -a --format '{{.Names}}' | grep -i calimero || true); do
              hits=$(docker logs "$c" 2>&1 | grep -icE "connection established|peer connected|dial success|mdns|kad|identified peer" || true)
              echo "$c: $hits peer/discovery log line(s)"
            done
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          for c in $(docker ps -a --format '{{.Names}}' | grep -i calimero || true); do
            echo "::group::docker logs $c"
            docker logs "$c" 2>&1 | tail -200 || true
            echo "::endgroup::"
          done

      - name: Tear down nodes
        if: always()
        run: |
          merobox stop --all 2>/dev/null || true
          merobox nuke -f 2>/dev/null || true
