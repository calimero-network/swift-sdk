name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test:
    name: Build & Test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Swift version
        run: swift --version

      - name: Build
        run: swift build -v

      - name: Test
        run: swift test -v

  lint:
    name: Lint (SwiftLint + swift-format)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install linters
        run: brew install swiftlint swift-format

      - name: SwiftLint
        run: swiftlint lint --strict --reporter github-actions-logging

      - name: swift-format lint
        run: swift-format lint --recursive --strict Sources Tests
